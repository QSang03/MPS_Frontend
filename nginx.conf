events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Map để lấy serial slug từ Referer headers (an toàn hơn Regex trong if)
    map $http_referer $ref_printer_slug {
        ~*printer/(?<slug>[^/?]+)  $slug;
        default                    "";
    }

    # Map for WebSocket/SSE Connection Upgrade
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      ""; # Dùng chuỗi rỗng thay vì 'close' để bật keep-alive cho thiết bị nhúng
    }

    # ... (giữ nguyên Logging và Gzip)

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Upstream for Next.js app
    upstream nextjs_backend {
        server nextjs:3000;
    }

    # Upstream cho API Gateway (Backend)
    upstream api_gateway {
        server 192.168.117.210:5000;
    }

    # Server block
    server {
        listen 80;
        server_name localhost;

        # 1. Printer Tunnel (HTTP)
        location ~* ^/printer/([^/]+)(/.*)?$ {
            set $serial_slug $1;
            set $remaining_path $2;
            
            absolute_redirect off;
            if ($remaining_path = "") {
                rewrite ^/printer/([^/]+)$ /printer/$1/ permanent;
            }

            proxy_set_header X-Original-Args $args;
            proxy_pass http://api_gateway/printers/auth/$serial_slug?path=$remaining_path;
            
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Fix Mixed Content for Gateway
            proxy_set_header X-Forwarded-Port $server_port;
            
            set $auth_token $http_authorization;
            if ($cookie_access_token != "") {
                set $auth_token "Bearer $cookie_access_token";
            }
            proxy_set_header Authorization $auth_token;
            proxy_intercept_errors on;
        }

        # 1.1 Printer Tunnel (HTTPS)
        location ~* ^/printer-secure/([^/]+)(/.*)?$ {
            set $serial_slug $1;
            set $remaining_path $2;
            
            absolute_redirect off;
            if ($remaining_path = "") {
                rewrite ^/printer-secure/([^/]+)$ /printer-secure/$1/ permanent;
            }

            proxy_set_header X-Original-Args $args;
            proxy_set_header X-Proxy-Protocol "https"; 
            proxy_pass http://api_gateway/printers/auth/$serial_slug?path=$remaining_path;
            
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Fix Mixed Content for Gateway
            proxy_set_header X-Forwarded-Port $server_port;
            
            set $auth_token $http_authorization;
            if ($cookie_access_token != "") {
                set $auth_token "Bearer $cookie_access_token";
            }
            proxy_set_header Authorization $auth_token;
            proxy_intercept_errors on;
        }

        # 2. Internal proxy handled by X-Accel-Redirect
        location ~* ^/__internal_proxy/(\d+)(/.*)$ {
            internal;
            set $target_port $1;
            set $target_path $2;
            set $printer_ip $upstream_http_x_printer_ip;
            if ($printer_ip = "") {
                return 400 "Missing Printer IP in Authorization";
            }

            proxy_pass http://192.168.117.210:$target_port$target_path; 

            proxy_set_header Host $printer_ip;

            # FIX REDIRECT: Ép dùng HTTPS và quay lại domain mps.chinhnhan.vn
            proxy_redirect ~*^https?://[^/]+(/?.*)$ https://$host/printer/$serial_slug$1;
            proxy_redirect / https://$host/printer/$serial_slug/;

            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # CSP & BUFFERING
            proxy_hide_header Content-Security-Policy;
            proxy_hide_header X-Frame-Options;
            add_header Content-Security-Policy "upgrade-insecure-requests; default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; connect-src * 'unsafe-inline'; script-src * 'unsafe-inline' 'unsafe-eval'; style-src * 'unsafe-inline'; img-src * data:; font-src * data:; frame-ancestors *;" always;
            add_header X-Frame-Options "ALLOWALL" always;

            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;

            proxy_buffering off;
            proxy_request_buffering off;
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # 2.1 Internal proxy cho HTTPS Backends (máy in đòi SSL)
        location ~* ^/__internal_proxy_secure/(\d+)(/.*)$ {
            internal;
            set $target_port $1;
            set $target_path $2;
            
            set $printer_ip $upstream_http_x_printer_ip;
            if ($printer_ip = "") {
                 return 400 "Missing Printer IP in Authorization";
            }

            # Dùng https:// qua tunnel port
            proxy_pass https://192.168.117.210:$target_port$target_path; 

            proxy_set_header Host $printer_ip;
            proxy_ssl_name $printer_ip; # SNI cho HTTPS

            # FIX REDIRECT: Luôn giữ ở /printer-secure/ khi máy in yêu cầu chuyển hướng
            proxy_redirect ~*^https?://[^/]+(/?.*)$ https://$host/printer-secure/$serial_slug$1;
            proxy_redirect / https://$host/printer-secure/$serial_slug/;

            proxy_ssl_verify off;
            proxy_ssl_server_name on;

            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # CSP & BUFFERING
            proxy_hide_header Content-Security-Policy;
            proxy_hide_header X-Frame-Options;
            add_header Content-Security-Policy "upgrade-insecure-requests; default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; connect-src * 'unsafe-inline'; script-src * 'unsafe-inline' 'unsafe-eval'; style-src * 'unsafe-inline'; img-src * data:; font-src * data:; frame-ancestors *;" always;
            add_header X-Frame-Options "ALLOWALL" always;

            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;

            proxy_buffering off;
            proxy_request_buffering off;
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # Proxy all requests to Next.js except /socket.io/
        location / {
            absolute_redirect off; # Quan trọng: Giữ nguyên port của trình duyệt (10000)

            # SỬA LỖI: Gom điều kiện redirect vào biến để dập tắt vòng lặp (Redirect Loop)
            # Chỉ redirect nếu request đến từ UI máy in mà lại thiếu prefix /printer/
            set $need_ref_redirect "";
            if ($ref_printer_slug) {
                set $need_ref_redirect "Y";
            }
            # LOẠI TRỪ: Nếu request URI đã thuộc về các route đặc biệt thì KHÔNG redirect nữa
            if ($request_uri ~* "^/(printer|printers|__internal_proxy|tunnel|mps-uploads|socket\.io|api/|public/|static/|favicon\.ico|assets/)") {
                set $need_ref_redirect "N";
            }
            if ($need_ref_redirect = "Y") {
                return 302 /printer/$ref_printer_slug$request_uri;
            }

            proxy_pass http://nextjs_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            # Forward the original host including port so Next.js Server Actions
            # see a matching `origin` header (use $http_host which includes port when present)
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Fix Mixed Content for Gateway
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_cache_bypass $http_upgrade;
        }

        # Cấu hình proxy cho Socket.IO
        location /socket.io/ {
            proxy_pass http://192.168.117.210:3019; # IP nội bộ của Backend

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;

            # Các header bổ sung nếu cần để bypass CORS hoặc IP forwarding
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Fix Mixed Content for Gateway
            proxy_set_header X-Forwarded-Port $server_port;

            # Tăng timeout nếu socket hay bị ngắt kết nối
            proxy_read_timeout 86400;
        }

        # Chisel Tunnel Server
        location /tunnel/ {
            proxy_pass http://192.168.117.210:2222/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Fix Mixed Content for Gateway
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Cấu hình timeout cho WebSocket (Chisel tunnel) sống sót lâu hơn
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        location /mps-uploads {
            proxy_pass http://192.168.117.210:9000;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Fix Mixed Content for Gateway
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            chunked_transfer_encoding off;
        }
    }
}
